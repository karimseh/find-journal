services:
  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
      - FLASK_DEBUG=0


  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
